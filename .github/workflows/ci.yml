name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend: migrate -> seed -> serve -> run the full integration suite
  # (auth, ideas, comments, collaboration, messages, notifications, realtime WS)
  # ---------------------------------------------------------------------------
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: starfeeds
          POSTGRES_PASSWORD: starfeeds
          POSTGRES_DB: starfeeds
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://starfeeds:starfeeds@localhost:5432/starfeeds
      SECRET_KEY: ci-not-a-real-secret-but-long-enough-to-pass-validation
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:3000

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Seed demo data
        run: python -m app.seed

      - name: Start API
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done

      - name: Full integration suite
        run: python full_test.py

  # ---------------------------------------------------------------------------
  # Frontend: lint + production build (also type-checks)
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Deploy: only on main, only after both jobs pass. Fires Render/Vercel deploy
  # hooks IF their secrets are set (otherwise it no-ops). To gate deploys on CI,
  # turn OFF auto-deploy in Render/Vercel and add these repo secrets:
  #   RENDER_DEPLOY_HOOK_URL, VERCEL_DEPLOY_HOOK_URL
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render (API) deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK" ]; then
            echo "Triggering Render deploy…"
            curl -fsS -X POST "$HOOK"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping API deploy."
          fi

      - name: Trigger Vercel (frontend) deploy
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK" ]; then
            echo "Triggering Vercel deploy…"
            curl -fsS -X POST "$HOOK"
          else
            echo "VERCEL_DEPLOY_HOOK_URL not set — skipping frontend deploy."
          fi
